# ─────────────────────────────────────────────────────────────────────────────
# Klipper G-code Auto-Cleanup — Configuration
# Edit this file in the Fluidd / Mainsail config editor.
# All changes take effect on the next hourly check — no restart needed.
# ─────────────────────────────────────────────────────────────────────────────

[gcode_cleanup]

# ── Schedule ─────────────────────────────────────────────────────────────────

# Day of the month to move stale G-code files to trash  (1 – 28)
cleanup_day: 1

# Day of the month to permanently delete files from trash  (1 – 28)
# Must be later than cleanup_day to give you a recovery window.
purge_day: 7

# Hour of the day to run  (0 – 23, in your Pi's local timezone)
# The Pi clock is set to Asia/Kolkata (IST).  5 = 05:00 IST.
run_hour: 5

# ── Retention rules ──────────────────────────────────────────────────────────

# Files uploaded within this many days are never moved to trash.
min_upload_age_days: 7

# Files that were printed (started) within this many days are never moved to trash.
min_since_print_days: 7

# ── Notifications: ntfy (web / phone push notifications) ─────────────────────
# ntfy delivers real browser and phone push notifications.
# Setup: subscribe to your topic at https://ntfy.sh/<your_topic>
#        or install the ntfy app and subscribe there.
# Pick a unique topic name — treat it like a password (it's unguessable by default).

ntfy_enabled: false
# Public ntfy.sh server (free, no account needed) or your self-hosted instance
ntfy_url: https://ntfy.sh
# Your unique topic name, e.g. klipper-workshop-abc123
ntfy_topic:

# ── Notifications: Fluidd / Mainsail console (secondary) ─────────────────────
# Sends a message to the GCode console in Fluidd / Mainsail as a fallback.
fluidd_notifications: true

# ── Notifications: Home Assistant (disabled — fill in and flip to true) ───────
homeassistant_enabled: false
homeassistant_url: http://homeassistant.local:8123
# Long-lived access token from HA → Profile → Security → Long-Lived Access Tokens
homeassistant_token:
# HA service to call, e.g. notify.mobile_app_my_phone  or  notify.notify
homeassistant_notify_service: notify.notify

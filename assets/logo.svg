<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="60%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f38ba8"/>
    </linearGradient>
    <linearGradient id="printerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background card -->
  <rect width="860" height="220" rx="18" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#cdd6f4" stroke-width="1">
    <line x1="0" y1="44" x2="860" y2="44"/>
    <line x1="0" y1="88" x2="860" y2="88"/>
    <line x1="0" y1="132" x2="860" y2="132"/>
    <line x1="0" y1="176" x2="860" y2="176"/>
    <line x1="86" y1="0" x2="86" y2="220"/>
    <line x1="172" y1="0" x2="172" y2="220"/>
    <line x1="258" y1="0" x2="258" y2="220"/>
  </g>

  <!-- ── 3D Printer illustration ────────────────────────────────── -->

  <!-- Printer frame - top bar -->
  <rect x="28" y="28" width="200" height="14" rx="7" fill="url(#printerGrad)" filter="url(#glow)"/>
  <!-- Left column -->
  <rect x="28" y="28" width="14" height="152" rx="7" fill="url(#printerGrad)"/>
  <!-- Right column -->
  <rect x="214" y="28" width="14" height="152" rx="7" fill="url(#printerGrad)"/>
  <!-- Cross brace -->
  <rect x="42" y="54" width="172" height="6" rx="3" fill="#313244"/>

  <!-- Print bed platform -->
  <rect x="38" y="168" width="188" height="14" rx="6" fill="#74c7ec" filter="url(#glow)"/>
  <!-- Bed support legs -->
  <rect x="60" y="174" width="8" height="18" rx="3" fill="#45475a"/>
  <rect x="172" y="174" width="8" height="18" rx="3" fill="#45475a"/>

  <!-- Extruder carriage -->
  <rect x="98" y="62" width="64" height="22" rx="5" fill="#313244"/>
  <rect x="102" y="66" width="56" height="14" rx="3" fill="#585b70"/>
  <!-- Carriage rail indicator -->
  <rect x="42" y="65" width="172" height="4" rx="2" fill="#45475a"/>

  <!-- Hotend + nozzle -->
  <rect x="114" y="84" width="32" height="24" rx="4" fill="#cba6f7" filter="url(#glow)"/>
  <!-- Nozzle tip -->
  <polygon points="118,108 142,108 130,124" fill="#cba6f7"/>
  <!-- Heating block glow -->
  <rect x="116" y="86" width="28" height="20" rx="3" fill="#f38ba8" opacity="0.25"/>

  <!-- Extrusion line (filament being printed) -->
  <line x1="130" y1="124" x2="130" y2="168" stroke="#a6e3a1" stroke-width="3"
        stroke-dasharray="5,4" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>

  <!-- Printed layers on bed -->
  <rect x="100" y="152" width="60" height="6" rx="2" fill="#a6e3a1" opacity="0.5"/>
  <rect x="106" y="146" width="48" height="6" rx="2" fill="#a6e3a1" opacity="0.35"/>
  <rect x="112" y="140" width="36" height="6" rx="2" fill="#a6e3a1" opacity="0.2"/>

  <!-- ── Broom ───────────────────────────────────────────────────── -->

  <!-- Handle -->
  <line x1="222" y1="45" x2="268" y2="160"
        stroke="#fab387" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Broom head base -->
  <ellipse cx="276" cy="167" rx="32" ry="11"
           fill="#fab387" transform="rotate(-26, 276, 167)" filter="url(#glow)"/>

  <!-- Bristles -->
  <g stroke="#f9e2af" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
    <line x1="250" y1="174" x2="242" y2="192"/>
    <line x1="260" y1="178" x2="255" y2="196"/>
    <line x1="270" y1="180" x2="267" y2="198"/>
    <line x1="280" y1="180" x2="280" y2="198"/>
    <line x1="290" y1="177" x2="293" y2="195"/>
    <line x1="299" y1="172" x2="304" y2="189"/>
  </g>

  <!-- ── Flying gcode file cards ──────────────────────────────────── -->

  <!-- File 1 - rotating, leaving -->
  <g transform="rotate(-18, 318, 148)">
    <rect x="308" y="136" width="22" height="28" rx="4" fill="#a6e3a1" opacity="0.85"/>
    <polygon points="322,136 330,136 330,144" fill="#313244" opacity="0.35"/>
    <line x1="313" y1="148" x2="325" y2="148" stroke="#1e1e2e" stroke-width="1.5"/>
    <line x1="313" y1="153" x2="325" y2="153" stroke="#1e1e2e" stroke-width="1.5"/>
    <line x1="313" y1="158" x2="321" y2="158" stroke="#1e1e2e" stroke-width="1.5"/>
    <text x="313" y="145" font-family="monospace" font-size="5" fill="#1e1e2e">.gcode</text>
  </g>

  <!-- File 2 - further out, more rotation -->
  <g transform="rotate(-35, 340, 118)">
    <rect x="330" y="108" width="18" height="22" rx="3" fill="#89dceb" opacity="0.7"/>
    <polygon points="341,108 348,108 348,115" fill="#313244" opacity="0.3"/>
    <line x1="334" y1="118" x2="344" y2="118" stroke="#1e1e2e" stroke-width="1.2"/>
    <line x1="334" y1="122" x2="344" y2="122" stroke="#1e1e2e" stroke-width="1.2"/>
  </g>

  <!-- File 3 - small, tumbling away -->
  <g transform="rotate(-55, 355, 92)">
    <rect x="347" y="83" width="14" height="18" rx="2" fill="#f38ba8" opacity="0.55"/>
    <line x1="350" y1="92" x2="357" y2="92" stroke="#1e1e2e" stroke-width="1"/>
    <line x1="350" y1="96" x2="357" y2="96" stroke="#1e1e2e" stroke-width="1"/>
  </g>

  <!-- Motion trail dots -->
  <g opacity="0.3">
    <circle cx="310" cy="158" r="2.5" fill="#fab387"/>
    <circle cx="326" cy="134" r="2" fill="#fab387"/>
    <circle cx="344" cy="112" r="1.5" fill="#fab387"/>
  </g>

  <!-- ── Right panel: text ─────────────────────────────────────────── -->

  <!-- Project name -->
  <text x="390" y="88"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="34" font-weight="800" letter-spacing="-0.5"
        fill="url(#titleGrad)" filter="url(#softglow)">klipper-gcode-cleanup</text>

  <!-- Tagline -->
  <text x="392" y="118"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="15" fill="#cdd6f4" opacity="0.8">
    Auto-stale G-code management for Klipper / Moonraker
  </text>

  <!-- Divider -->
  <rect x="390" y="132" width="440" height="1.5" rx="1" fill="#45475a"/>

  <!-- Feature pills -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="12">
    <!-- Pill 1 -->
    <rect x="390" y="143" width="104" height="22" rx="11" fill="#313244"/>
    <circle cx="406" cy="154" r="5" fill="#a6e3a1"/>
    <text x="416" y="158" fill="#cdd6f4">Zero sudo</text>

    <!-- Pill 2 -->
    <rect x="502" y="143" width="130" height="22" rx="11" fill="#313244"/>
    <circle cx="518" cy="154" r="5" fill="#89b4fa"/>
    <text x="528" y="158" fill="#cdd6f4">Moonraker native</text>

    <!-- Pill 3 -->
    <rect x="640" y="143" width="110" height="22" rx="11" fill="#313244"/>
    <circle cx="656" cy="154" r="5" fill="#cba6f7"/>
    <text x="666" y="158" fill="#cdd6f4">Push notifs</text>

    <!-- Pill 4 -->
    <rect x="758" y="143" width="82" height="22" rx="11" fill="#313244"/>
    <circle cx="774" cy="154" r="5" fill="#fab387"/>
    <text x="784" y="158" fill="#cdd6f4">MIT</text>
  </g>

  <!-- Bottom stat bar -->
  <rect x="390" y="176" width="445" height="30" rx="8" fill="#181825"/>
  <g font-family="'Courier New', monospace" font-size="11.5" fill="#6c7086">
    <text x="406" y="195">Python 3.11+</text>
    <line x1="486" y1="182" x2="486" y2="200" stroke="#313244" stroke-width="1"/>
    <text x="496" y="195">Fluidd / Mainsail</text>
    <line x1="602" y1="182" x2="602" y2="200" stroke="#313244" stroke-width="1"/>
    <text x="612" y="195">ntfy  |  Home Assistant</text>
    <line x1="736" y1="182" x2="736" y2="200" stroke="#313244" stroke-width="1"/>
    <text x="746" y="195">v1.1.0</text>
  </g>

  <!-- Subtle border glow -->
  <rect width="860" height="220" rx="18" fill="none"
        stroke="#89b4fa" stroke-width="1" opacity="0.15"/>
</svg>

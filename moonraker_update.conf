# ─────────────────────────────────────────────────────────────────────────────
# Add this block to ~/printer_data/config/moonraker.conf
# to enable automatic updates via Fluidd / Mainsail.
#
# After adding it, restart Moonraker:
#   sudo systemctl restart moonraker
#
# The addon will appear in the Update Manager panel and can be updated
# with a single click, just like Klipper or Fluidd itself.
# ─────────────────────────────────────────────────────────────────────────────

[update_manager klipper-gcode-cleanup]
type: git_repo
path: ~/klipper-gcode-cleanup
origin: https://github.com/skhurana333/klipper-gcode-cleanup.git
primary_branch: main
install_script: install.sh
# No managed_services — the addon uses a cron job, not a daemon.
# install.sh is re-run after each update to refresh the cron entry.
